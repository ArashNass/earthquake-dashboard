# Builds the dashboard with live USGS data and publishes it to GitHub Pages.
# Runs hourly, on every push to main, and on demand (Run workflow button).
# GitHub Pages hosting and these scheduled builds are free for public repos -
# no Netlify credits involved.

name: Build and publish dashboard

on:
  schedule:
    - cron: "0 * * * *"   # every hour, on the hour, UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build dashboard with live data
        run: python run.py --no-open --no-ai
      - name: Stage site
        run: mkdir -p dist && cp earthquake_brief.html dist/index.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
